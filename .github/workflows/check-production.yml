name: Check Production
on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  get_previous_status:
    runs-on: ubuntu-latest
    outputs:
      previous_status: ${{ steps.get_previous_status.outputs.status }}

    steps:
      - name: Get Previous Run Status
        id: get_previous_status
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { data } = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: "check-production.yml",
              per_page: 2,
            });
            const runs = data.workflow_runs;
            const previous = runs?.[1]?.conclusion || 'none';
            console.log(`Previous run conclusion: ${previous}`);

            core.setOutput("status", previous);

  run-tests:
    needs: get_previous_status
    uses: trade-tariff/trade-tariff-tools/.github/workflows/e2e-tests.yml@main
    with:
      test-environment: production
      ref: ${{ github.sha }}

  on-failure:
    runs-on: ubuntu-latest
    if: ${{always() && needs.get_previous_status.outputs.previous_status == 'success' && needs.run-tests.result != 'success'}}
    needs:
      - get_previous_status
      - run-tests
    steps:
      - uses: actions/checkout@v4
      - name: Slack notification
        uses: trade-tariff/trade-tariff-tools/.github/actions/slack-notify@main
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          username: GitHub
          channel: production-alerts
          color: failure
          title: Workflow ${{ needs.run-tests.result }}
          message: Workflow ${{ needs.run-tests.result }}
